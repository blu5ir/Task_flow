name: Presentation Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Check Python syntax
      run: python -m py_compile taskflow.py

    - name: Import application
      run: python -c "import taskflow"

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "Application Built"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: chmod +x deploy.sh

      - run: ./deploy.sh
