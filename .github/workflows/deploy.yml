name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ssh.pythonanywhere.com
          username: blu5ir
          key: ${{ secrets.PA_SSH_KEY }}
          port: 22
          debug: true
          script: |
            set -xe

            cd /home/blu5ir/Task_flow

            git fetch origin
            git reset --hard origin/main
            git clean -fd

            source /home/blu5ir/Task_flow/venv/bin/activate

            pip install -r requirements.txt

            touch /var/www/blu5ir_pythonanywhere_com_wsgi.py

            echo "Deployment successful!"
